<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Level Devil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #111; color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; font-family: sans-serif; text-align: center; z-index: 100;
    }
    #rotate-msg .icon { font-size: 64px; animation: spin 2s ease-in-out infinite; }
    #rotate-msg p { font-size: 18px; opacity: 0.85; padding: 0 30px; }
    @keyframes spin {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(90deg); }
    }

    @media (orientation: portrait) {
      #rotate-msg { display: flex; }
      #game-wrap  { display: none; }
    }
    @media (orientation: landscape) {
      #rotate-msg { display: none; }
      #game-wrap  { display: block; }
    }

    #game-wrap { position: fixed; inset: 0; }

    iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    #overlay {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .ovr-btn {
      position: absolute;
      pointer-events: all;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: bold; color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      border: 3px solid rgba(255,255,255,0.8);
      transition: filter 0.08s;
      opacity: 0.92;
    }
    .ovr-btn:active { filter: brightness(1.6); }

    /* Tamaño igual al de los botones del juego, posicionados encima */
    /* El iframe ocupa desde ~17% left hasta ~82% right de la pantalla */
    /* Los botones del juego están al fondo del iframe ~93% height */

    #btn-left {
      background: rgba(200, 30, 30, 0.85);
      border-radius: 30px;
      /* Botón ← del juego: ~25% del ancho del iframe desde izq, bottom ~7% */
      bottom: 4%;
      left: 21%;
      width: 9%;
      height: 10%;
    }
    #btn-right {
      background: rgba(200, 30, 30, 0.85);
      border-radius: 30px;
      /* Botón → del juego: ~37% del ancho del iframe desde izq */
      bottom: 4%;
      left: 32%;
      width: 9%;
      height: 10%;
    }
    #btn-jump {
      background: rgba(210, 110, 0, 0.9);
      border-radius: 50%;
      /* Botón salto: ~85% del ancho del iframe desde izq */
      bottom: 4%;
      right: 4%;
      width: 9%;
      height: 10%;
    }
  </style>
</head>
<body>

  <div id="rotate-msg">
    <div class="icon">📱➡️🎮</div>
    <p>Gira tu teléfono para jugar Level Devil</p>
  </div>

  <div id="game-wrap">
    <iframe
      id="gframe"
      src="https://1games.io/game/level-devil/"
      allowfullscreen="true"
      allow="autoplay; fullscreen; gamepad; keyboard-map *"
      scrolling="no"
      sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-scripts allow-same-origin"
    ></iframe>

    <div id="overlay">
      <div class="ovr-btn" id="btn-left">←</div>
      <div class="ovr-btn" id="btn-right">→</div>
      <div class="ovr-btn" id="btn-jump">↑</div>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('gframe');

    function touchAt(relX, relY, type) {
      const rect = iframe.getBoundingClientRect();
      const x = rect.left + rect.width  * relX;
      const y = rect.top  + rect.height * relY;
      try {
        const touch = new Touch({
          identifier: Date.now(),
          target: iframe,
          clientX: x, clientY: y,
          screenX: x, screenY: y,
          pageX: x,   pageY: y,
          radiusX: 15, radiusY: 15,
          rotationAngle: 0, force: 1
        });
        const ev = new TouchEvent(type, {
          bubbles: true, cancelable: true,
          touches:        type === 'touchend' ? [] : [touch],
          targetTouches:  type === 'touchend' ? [] : [touch],
          changedTouches: [touch]
        });
        iframe.dispatchEvent(ev);
      } catch(e) {}
    }

    // Posiciones relativas dentro del iframe donde están los botones originales
    const POS = {
      left:  { x: 0.10, y: 0.94 },
      right: { x: 0.25, y: 0.94 },
      jump:  { x: 0.87, y: 0.94 }
    };

    function bindBtn(id, posKey) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        touchAt(POS[posKey].x, POS[posKey].y, 'touchstart');
      }, { passive: false });
      btn.addEventListener('touchend', e => {
        e.preventDefault();
        touchAt(POS[posKey].x, POS[posKey].y, 'touchend');
      }, { passive: false });
      btn.addEventListener('mousedown', () => touchAt(POS[posKey].x, POS[posKey].y, 'touchstart'));
      btn.addEventListener('mouseup',   () => touchAt(POS[posKey].x, POS[posKey].y, 'touchend'));
    }

    bindBtn('btn-left',  'left');
    bindBtn('btn-right', 'right');
    bindBtn('btn-jump',  'jump');

    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.BackButton.show();
      window.Telegram.WebApp.BackButton.onClick(() => window.Telegram.WebApp.close());
    }
  </script>
</body>
</html>
