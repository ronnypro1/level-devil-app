<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Level Devil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #111; color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; font-family: sans-serif; text-align: center; z-index: 100;
    }
    #rotate-msg .icon { font-size: 64px; animation: spin 2s ease-in-out infinite; }
    #rotate-msg p { font-size: 18px; opacity: 0.85; padding: 0 30px; }
    @keyframes spin {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(90deg); }
    }
    @media (orientation: portrait) {
      #rotate-msg { display: flex; }
      #game-wrap  { display: none; }
    }
    @media (orientation: landscape) {
      #rotate-msg { display: none; }
      #game-wrap  { display: block; }
    }

    #game-wrap {
      position: fixed; inset: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gframe {
      border: none;
      display: block;
      width: 960px;
      height: 600px;
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div id="rotate-msg">
    <div class="icon">📱➡️🎮</div>
    <p>Gira tu teléfono para jugar Level Devil</p>
  </div>

  <div id="game-wrap">
    <iframe
      id="gframe"
      src="https://1games.io/game/level-devil/"
      allowfullscreen="true"
      allow="autoplay; fullscreen; gamepad; keyboard-map *"
      scrolling="no"
      sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-scripts allow-same-origin"
    ></iframe>
  </div>

  <script>
    function scaleGame() {
      const frame = document.getElementById('gframe');
      const wrap  = document.getElementById('game-wrap');
      if (!frame || !wrap) return;

      const sw = wrap.clientWidth;
      const sh = wrap.clientHeight;

      // Escalar por ancho pero asegurando que los botones (parte baja) sean visibles
      // El juego tiene ratio 960x600 = 1.6
      // Usamos 90% del alto para dejar un poco de margen y ver los botones
      const scaleByW = sw / 960;
      const scaleByH = (sh * 0.98) / 600;
      const scale = Math.min(scaleByW, scaleByH);

      frame.style.transform = `scale(${scale})`;
    }

    window.addEventListener('load',   scaleGame);
    window.addEventListener('resize', scaleGame);
    scaleGame();

    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.BackButton.show();
      window.Telegram.WebApp.BackButton.onClick(() => window.Telegram.WebApp.close());
    }
  </script>
</body>
</html>
