<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Level Devil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; touch-action: none; }

    /* ── Mensaje rotar (solo portrait) ── */
    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #111; color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; font-family: sans-serif; text-align: center; z-index: 100;
    }
    #rotate-msg .icon { font-size: 64px; animation: spin 2s ease-in-out infinite; }
    #rotate-msg p { font-size: 18px; opacity: 0.85; padding: 0 30px; }
    @keyframes spin {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(90deg); }
    }

    /* ── Portrait: muestra mensaje, oculta juego ── */
    @media (orientation: portrait) {
      #rotate-msg  { display: flex; }
      #game-wrapper { display: none; }
    }

    /* ── Landscape: muestra juego, oculta mensaje ── */
    @media (orientation: landscape) {
      #rotate-msg  { display: none; }
      #game-wrapper { display: flex; }
    }

    #game-wrapper {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #111; overflow: hidden;
    }

    #canvas-area {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Mensaje portrait -->
  <div id="rotate-msg">
    <div class="icon">📱➡️🎮</div>
    <p>Gira tu teléfono para jugar Level Devil</p>
  </div>

  <!-- Juego landscape -->
  <div id="game-wrapper">
    <div id="canvas-area">
      <iframe
        id="game-frame"
        src="https://1games.io/game/level-devil/"
        allowfullscreen="true"
        allow="autoplay; fullscreen; gamepad; keyboard-map *"
        scrolling="no"
        sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-scripts allow-same-origin"
      ></iframe>
    </div>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.BackButton.show();
      window.Telegram.WebApp.BackButton.onClick(function () {
        window.Telegram.WebApp.close();
      });
    }
  </script>

</body>
</html>
