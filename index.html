<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Level Devil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; touch-action: none; }

    /* ── PORTRAIT ── */
    @media (orientation: portrait) {
      #game-wrapper {
        position: fixed; top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex; flex-direction: column;
        background: #111; overflow: hidden;
      }
      #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      #mobile-controls {
        height: 160px; flex-shrink: 0;
        display: flex; flex-direction: row;
        align-items: center; justify-content: space-between;
        padding: 10px 30px; gap: 16px;
        background: rgba(0,0,0,0.85);
      }
      #controls-left, #controls-right { display: flex; align-items: center; justify-content: center; }
    }

    /* ── LANDSCAPE ── */
    @media (orientation: landscape) {
      #game-wrapper {
        position: fixed; top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex; flex-direction: row;
        background: #111; overflow: hidden;
      }
      #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      #mobile-controls { display: contents; }
      #controls-left {
        width: 150px; flex-shrink: 0; order: -1;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.85);
      }
      #controls-right {
        width: 150px; flex-shrink: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px; background: rgba(0,0,0,0.85);
      }
    }

    /* ── iframe ── */
    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── D-Pad ── */
    .dpad { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
    .btn-d {
      position: absolute; width: 44px; height: 44px;
      background: rgba(255,255,255,0.18); border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: background 0.08s;
      user-select: none;
    }
    .btn-d:active, .btn-d.pressed { background: rgba(255,255,255,0.55); }
    .btn-left  { left: 0;    top: 43px; }
    .btn-right { left: 86px; top: 43px; }
    .btn-up    { left: 43px; top: 0;    }

    /* ── Botón salto ── */
    .btn-jump {
      width: 70px; height: 70px; border-radius: 50%;
      background: rgba(220,30,30,0.6);
      border: 3px solid rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #fff; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn-jump:active, .btn-jump.pressed { filter: brightness(1.6); }
  </style>
</head>
<body>

<div id="game-wrapper">

  <div id="canvas-area">
    <iframe
      id="game-frame"
      src="https://1games.io/game/level-devil/"
      allowfullscreen="true"
      allow="autoplay; fullscreen; gamepad; keyboard-map *"
      scrolling="no"
      sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-scripts allow-same-origin"
    ></iframe>
  </div>

  <!-- CONTROLES MÓVILES -->
  <div id="mobile-controls">
    <div id="controls-left">
      <div class="dpad">
        <div class="btn-d btn-up"    data-key="ArrowUp"    data-code="38">↑</div>
        <div class="btn-d btn-left"  data-key="ArrowLeft"  data-code="37">←</div>
        <div class="btn-d btn-right" data-key="ArrowRight" data-code="39">→</div>
      </div>
    </div>
    <div id="controls-right">
      <div class="btn-jump" data-key="Space" data-code="32">🦘</div>
    </div>
  </div>

</div>

<script>
  /* ── Disparo de teclas al iframe ── */
  const iframe = document.getElementById('game-frame');

  function fireKey(type, keyCode, key) {
    const init = {
      bubbles: true, cancelable: true,
      key: key, code: key,
      keyCode: keyCode, which: keyCode, charCode: 0
    };
    const e = new KeyboardEvent(type, init);
    Object.defineProperty(e, 'keyCode', { get: () => keyCode });
    Object.defineProperty(e, 'which',   { get: () => keyCode });

    document.dispatchEvent(e);
    window.dispatchEvent(e);

    // Intentar también dentro del iframe
    try {
      iframe.contentDocument && iframe.contentDocument.dispatchEvent(e);
      iframe.contentWindow  && iframe.contentWindow.dispatchEvent(e);
    } catch(err) {}
  }

  document.querySelectorAll('[data-code]').forEach(btn => {
    const key  = btn.dataset.key;
    const code = parseInt(btn.dataset.code);

    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      btn.classList.add('pressed');
      fireKey('keydown', code, key);
    }, { passive: false });

    btn.addEventListener('touchend', e => {
      e.preventDefault();
      btn.classList.remove('pressed');
      fireKey('keyup', code, key);
    }, { passive: false });

    btn.addEventListener('touchcancel', e => {
      btn.classList.remove('pressed');
      fireKey('keyup', code, key);
    }, { passive: false });

    btn.addEventListener('mousedown', () => { btn.classList.add('pressed');    fireKey('keydown', code, key); });
    btn.addEventListener('mouseup',   () => { btn.classList.remove('pressed'); fireKey('keyup',   code, key); });
  });

  /* ── Telegram Mini App ── */
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
    window.Telegram.WebApp.BackButton.show();
    window.Telegram.WebApp.BackButton.onClick(function () {
      window.Telegram.WebApp.close();
    });
  }
</script>

</body>
</html>
